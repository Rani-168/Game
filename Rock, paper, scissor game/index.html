<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>😀Rock Paper Scissors😀</h1>
    <div class="info">
        <p >Your choice : <strong id="info1">Rock</strong></p>
        <p >Computer's choice: <strong id="info2">Rock</strong></p>
        <p >Result : <strong id="info3">Draw😊</strong></p>
    </div>

    <div class="image">
        <button onclick="playGame('rock')"><img src="rock1.png" alt="rock image" width="300px"></button>
        <button onclick="playGame('paper')"> <img src="paper.png" alt="rock image"width="300px"></button>
        <button onclick="playGame('scissor')"><img src="scissor.png" alt="rock image"width="300px"></button>
        
    </div>
    <script src="script.js"></script>

</body>
</html>
